version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install --include=dev
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=0, must-revalidate'
    - pattern: 'assets/**'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
customRules:
  # Serve pre-rendered route-specific HTML for SEO pages
  - source: /about
    target: /about/index.html
    status: '200'
  - source: /programme
    target: /programme/index.html
    status: '200'
  - source: /impact
    target: /impact/index.html
    status: '200'
  - source: /partners
    target: /partners/index.html
    status: '200'
  - source: /contact
    target: /contact/index.html
    status: '200'
  - source: /admissions
    target: /admissions/index.html
    status: '200'
  - source: /blog
    target: /blog/index.html
    status: '200'
  # Fallback for all other routes (SPA)
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp|xml)$)([^.]+$)/>'
    target: /index.html
    status: '200'
